    // 格式化时间
    formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }
    
    // 切换播放/暂停
    togglePlay() {
      if (this.audio.paused) {
        this.audio.play();
        this.isPlaying = true;
      } else {
        this.audio.pause();
        this.isPlaying = false;
      }
      this.updatePlayIcon();
    }
    
    // 更新播放按钮图标
    updatePlayIcon() {
      const iconSvg = this.playBtn.querySelector('svg');

      if (this.isPlaying) {
        // 暂停图标
        iconSvg.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
      } else {
        // 播放图标
        iconSvg.innerHTML = '<path d="M8 5v14l11-7z"/>';
      }
    }
    
    // 更新进度条
    updateProgress() {
      const current = this.audio.currentTime;
      const duration = this.audio.duration || 0;
      const percent = duration > 0 ? (current / duration) * 100 : 0;
      
      this.playedBar.style.width = percent + '%';
      this.ptimeEl.textContent = this.formatTime(current);
      
      if (duration > 0) {
        this.dtimeEl.textContent = this.formatTime(duration);
      }
    }
    
    // 更新缓冲进度
    updateLoaded() {
      if (this.audio.buffered.length > 0) {
        const loaded = this.audio.buffered.end(this.audio.buffered.length - 1);
        const duration = this.audio.duration || 0;
        const percent = duration > 0 ? (loaded / duration) * 100 : 0;
        this.loadedBar.style.width = percent + '%';
      }
    }
    
    // 点击进度条跳转
    seekTo(e) {
      const rect = this.barWrap.getBoundingClientRect();
      const percent = (e.clientX - rect.left) / rect.width;
      const duration = this.audio.duration || 0;
      this.audio.currentTime = percent * duration;
    }

    // 设置音量
    setVolume(e) {
      const rect = this.volumeBar.getBoundingClientRect();
      const percent = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      this.audio.volume = percent;
      this.volumePlayed.style.width = (percent * 100) + '%';
      this.volumeText.textContent = Math.round(percent * 100) + '%';
      this.updateVolumeIcon(percent);
    }

    // 开始拖拽音量
    startDragVolume(e) {
      this.isDraggingVolume = true;
      this.setVolume(e);
    }

    // 拖拽音量中
    dragVolume(e) {
      if (this.isDraggingVolume) {
        this.setVolume(e);
      }
    }

    // 结束拖拽音量
    endDragVolume() {
      this.isDraggingVolume = false;
    }

    // 更新音量图标
    updateVolumeIcon(volume) {
      const iconSvg = this.volumeBtn.querySelector('svg');
      if (volume === 0) {
        // 静音图标
        iconSvg.innerHTML = '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73 4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>';
      } else if (volume < 0.5) {
        // 低音量图标
        iconSvg.innerHTML = '<path d="M18.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5z"/>';
      } else {
        // 高音量图标
        iconSvg.innerHTML = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
      }
    }

    // 切换静音
    toggleMute() {
      if (this.audio.volume > 0) {
        this.lastVolume = this.audio.volume;
        this.audio.volume = 0;
        this.volumePlayed.style.width = '0%';
        this.volumeText.textContent = '0%';
      } else {
        this.audio.volume = this.lastVolume || 1;
        this.volumePlayed.style.width = ((this.lastVolume || 1) * 100) + '%';
        this.volumeText.textContent = Math.round((this.lastVolume || 1) * 100) + '%';
      }
      this.updateVolumeIcon(this.audio.volume);
    }

    // 解析LRC格式歌词
    parseLyrics(lrcText) {
      const lines = lrcText.trim().split('\n');
      const timeRegex = /\[(\d{2}):(\d{2})\.(\d{2,3})\](.*)/;
      
      this.parsedLyrics = lines.map(line => {
        const match = line.match(timeRegex);
        if (match) {
          const minutes = parseInt(match[1]);
          const seconds = parseInt(match[2]);
          const milliseconds = parseInt(match[3].padEnd(3, '0'));
          const time = minutes * 60 + seconds + milliseconds / 1000;
          const text = match[4].trim();
          return { time, text };
        }
        return null;
      }).filter(item => item !== null);
      
      // 按时间排序
      this.parsedLyrics.sort((a, b) => a.time - b.time);
    }
    
    // 渲染歌词
    renderLyrics() {
      this.lyricsContainer.innerHTML = this.parsedLyrics.map((item, index) => 
        `<div class="lyrics-line" data-index="${index}" data-time="${item.time}">${item.text}</div>`
      ).join('');
      
      // 添加点击事件
      this.lyricsContainer.querySelectorAll('.lyrics-line').forEach(line => {
        line.addEventListener('click', (e) => {
          const time = parseFloat(e.target.dataset.time);
          this.audio.currentTime = time;
          this.audio.play();
          this.isPlaying = true;
          this.updatePlayIcon();
        });
      });
    }
    
    // 更新当前歌词
    updateCurrentLyrics(currentTime) {
      let newIndex = -1;
      
      for (let i = 0; i < this.parsedLyrics.length; i++) {
        if (currentTime >= this.parsedLyrics[i].time) {
          newIndex = i;
        } else {
          break;
        }
      }
      
      if (newIndex !== this.currentLineIndex) {
        this.currentLineIndex = newIndex;
        this.highlightLyrics(newIndex);
      }
    }
    
    // 高亮当前歌词
    highlightLyrics(index) {
      const lines = this.lyricsContainer.querySelectorAll('.lyrics-line');
      lines.forEach((line, i) => {
        if (i === index) {
          line.classList.add('active');
          const containerRect = this.lyricsWrapper.getBoundingClientRect();
          const lineRect = line.getBoundingClientRect();
          const currentScrollTop = this.lyricsWrapper.scrollTop;
          const offset = lineRect.top - containerRect.top - containerRect.height / 2 + lineRect.height / 2;
          this.lyricsWrapper.scrollTo({
            top: currentScrollTop + offset,
            behavior: 'smooth'
          });
        } else {
          line.classList.remove('active');
        }
      });
      
      // 更新全屏歌词
      if (index >= 0 && this.parsedLyrics[index]) {
        this.fullscreenLyricsContent.textContent = this.parsedLyrics[index].text;
      }
    }
    
    // 进入全屏
    enterFullscreen() {
      this.fullscreenLyrics.classList.add('active');
      document.body.classList.add('lyrics-fullscreen-active');
      
      // 启动幻灯片播放
      this.startSlideshow();
      
      // 尝试进入浏览器全屏
      if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen();
      }
    }
    
    // 退出全屏
    exitFullscreen() {
      this.fullscreenLyrics.classList.remove('active');
      document.body.classList.remove('lyrics-fullscreen-active');
      
      // 停止幻灯片播放
      this.stopSlideshow();
      
      if (document.exitFullscreen) {
        document.exitFullscreen();
      }
    }
    
    // 启动幻灯片播放
    startSlideshow() {
      const slides = document.querySelectorAll('.slideshow-slide');
      if (slides.length === 0) return;
      
      let currentSlide = 0;
      
      // 显示第一张图片
      slides.forEach((slide, index) => {
        slide.classList.remove('active');
      });
      slides[0].classList.add('active');
      
      // 每5秒切换一张图片
      this.slideshowInterval = setInterval(() => {
        slides[currentSlide].classList.remove('active');
        currentSlide = (currentSlide + 1) % slides.length;
        slides[currentSlide].classList.add('active');
      }, 5000);
    }
    
    // 停止幻灯片播放
    stopSlideshow() {
      if (this.slideshowInterval) {
        clearInterval(this.slideshowInterval);
        this.slideshowInterval = null;
      }
    }
    
    // 绑定事件
    bindEvents() {
      // 音频时间更新
      this.audio.addEventListener('timeupdate', () => {
        this.updateCurrentLyrics(this.audio.currentTime);
        this.updateProgress();
      });
      
      // 音频缓冲更新
      this.audio.addEventListener('progress', () => {
        this.updateLoaded();
      });
      
      // 音频元数据加载完成
      this.audio.addEventListener('loadedmetadata', () => {
        this.dtimeEl.textContent = this.formatTime(this.audio.duration);
      });
      
      // 音频播放结束
      this.audio.addEventListener('ended', () => {
        this.isPlaying = false;
        this.updatePlayIcon();
      });
      
      // 播放/暂停按钮（封面区域）
      this.playBtn.addEventListener('click', () => {
        this.togglePlay();
      });
      
      // 进度条点击
      this.barWrap.addEventListener('click', (e) => {
        this.seekTo(e);
      });

      // 音量条事件（支持拖拽）
      this.volumeBarWrap.addEventListener('mousedown', (e) => {
        this.startDragVolume(e);
      });

      document.addEventListener('mousemove', (e) => {
        this.dragVolume(e);
      });

      document.addEventListener('mouseup', () => {
        this.endDragVolume();
      });

      // 音量按钮点击（切换静音）
      this.volumeBtn.addEventListener('click', () => {
        this.toggleMute();
      });

      // 全屏按钮
      this.fullscreenBtn.addEventListener('click', () => {
        this.enterFullscreen();
      });
      
      // 退出全屏按钮
      this.exitFullscreenBtn.addEventListener('click', () => {
        this.exitFullscreen();
      });
      
      // ESC键退出全屏
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          this.exitFullscreen();
        }
      });
      
      // 全屏状态变化
      document.addEventListener('fullscreenchange', () => {
        if (!document.fullscreenElement) {
          this.exitFullscreen();
        }
      });
    }
  }

  // 初始化播放器
